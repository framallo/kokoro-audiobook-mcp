name: release

# Tag a version and this builds + publishes the prebuilt `kab` binary:
#   git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    # Apple Silicon runner — kab targets macOS arm64 (Apple Neural Engine).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build release
        run: swift build -c release

      - name: Ad-hoc codesign (so a downloaded copy passes Gatekeeper)
        run: codesign --force --sign - .build/release/kab

      - name: Stage asset
        run: cp .build/release/kab kab-macos-arm64

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: kab-macos-arm64
          fail_on_unmatched_files: true
